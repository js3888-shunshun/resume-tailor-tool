<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Resume Tailor</title>
  <style>
    :root {
      --bg: #0f1216;
      --panel: #181d24;
      --panel-2: #1f262f;
      --border: #2a323d;
      --text: #e6edf3;
      --muted: #9aa7b4;
      --accent: #4f8cff;
      --accent-soft: #1b2a47;
      --hl: #ffd35c;
      --hl-bg: #3a2f0a;
      --ok: #3fb950;
      --err: #f85149;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; background: var(--bg); color: var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      line-height: 1.5;
    }
    .wrap { max-width: 920px; margin: 0 auto; padding: 32px 20px 80px; }
    header { display: flex; align-items: baseline; justify-content: space-between; flex-wrap: wrap; gap: 8px; }
    h1 { font-size: 22px; margin: 0; }
    .sub { color: var(--muted); font-size: 13px; }
    .status { font-size: 12px; color: var(--muted); }
    .status .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 4px; vertical-align: middle; }
    .dot.ok { background: var(--ok); } .dot.bad { background: var(--err); }
    .card { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 18px; margin-top: 20px; }
    label { font-size: 13px; color: var(--muted); display: block; margin-bottom: 6px; }
    textarea {
      width: 100%; min-height: 220px; resize: vertical; background: var(--panel-2);
      color: var(--text); border: 1px solid var(--border); border-radius: 8px; padding: 12px;
      font-family: ui-monospace, "Cascadia Code", Consolas, monospace; font-size: 13px;
    }
    .row { display: flex; gap: 12px; align-items: center; margin-top: 12px; }
    button {
      background: var(--accent); color: #fff; border: 0; border-radius: 8px;
      padding: 10px 18px; font-size: 14px; font-weight: 600; cursor: pointer;
    }
    button:disabled { opacity: 0.55; cursor: not-allowed; }
    button.secondary { background: var(--panel-2); border: 1px solid var(--border); color: var(--text); }
    .hint { color: var(--muted); font-size: 12px; }
    .error { color: var(--err); font-size: 13px; margin-top: 12px; white-space: pre-wrap; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
    @media (max-width: 680px) { .grid { grid-template-columns: 1fr; } }
    .field-title { font-size: 12px; text-transform: uppercase; letter-spacing: 0.04em; color: var(--muted); margin: 0 0 8px; }
    .big { font-size: 18px; font-weight: 600; }
    .chips { display: flex; flex-wrap: wrap; gap: 6px; }
    .chip { background: var(--panel-2); border: 1px solid var(--border); border-radius: 999px; padding: 3px 10px; font-size: 12px; }
    .chip.cat { background: var(--accent-soft); border-color: #2d4a7a; color: #bdd3ff; }
    .chip.kw { background: var(--hl-bg); border-color: #5a4a14; color: var(--hl); font-weight: 600; }
    ul.resp { margin: 0; padding-left: 18px; }
    ul.resp li { margin-bottom: 4px; font-size: 14px; }
    .muted { color: var(--muted); }
    details.raw { margin-top: 18px; }
    details.raw pre { background: #0b0e12; border: 1px solid var(--border); border-radius: 8px; padding: 12px; overflow:auto; font-size: 12px; }
    .spinner { display:inline-block; width:14px; height:14px; border:2px solid #fff; border-top-color: transparent; border-radius:50%; animation: spin 0.7s linear infinite; vertical-align: middle; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div>
        <h1>AI Resume Tailor</h1>
        <div class="sub">Step 2 demo — paste a job description, get a structured JD profile.</div>
      </div>
      <div class="status" id="status">checking backend…</div>
    </header>

    <div class="card">
      <label for="jd">Job description</label>
      <textarea id="jd" placeholder="Paste the full job description here…"></textarea>
      <div class="row">
        <button id="analyzeBtn">Analyze JD</button>
        <button class="secondary" id="sampleBtn">Load sample JD</button>
        <span class="hint" id="hint"></span>
      </div>
      <div class="error" id="error"></div>
    </div>

    <div class="card" id="result" style="display:none;">
      <div class="grid">
        <div>
          <p class="field-title">Role</p>
          <div class="big" id="r-title">—</div>
          <div class="muted" id="r-company">—</div>
        </div>
        <div>
          <p class="field-title">Category</p>
          <div class="chips" id="r-cats"></div>
          <p class="field-title" style="margin-top:14px;">Tone</p>
          <div class="muted" id="r-tone">—</div>
        </div>
      </div>

      <p class="field-title" style="margin-top:18px;">Keywords to highlight</p>
      <div class="chips" id="r-keywords"></div>

      <div class="grid" style="margin-top:18px;">
        <div>
          <p class="field-title">Key skills</p>
          <div class="chips" id="r-skills"></div>
        </div>
        <div>
          <p class="field-title">Key responsibilities</p>
          <ul class="resp" id="r-resp"></ul>
        </div>
      </div>

      <details class="raw">
        <summary class="muted">Raw JSON</summary>
        <pre id="r-raw"></pre>
      </details>
    </div>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);

    const SAMPLE_JD = `Senior Machine Learning Engineer - Acme Robotics

We are building autonomous warehouse robots. You will design, train and deploy
deep learning perception models (object detection, segmentation) using PyTorch,
optimize inference on NVIDIA Jetson with TensorRT, and build data pipelines in
Python and Spark to process millions of sensor frames. Experience with MLOps
(Docker, Kubernetes, MLflow), real-time systems, and A/B testing of model
versions in production is required. Fast-paced startup environment.`;

    async function refreshStatus() {
      try {
        const r = await fetch('/health');
        const h = await r.json();
        const keyOk = h.has_api_key;
        $('status').innerHTML =
          `<span class="dot ${keyOk ? 'ok' : 'bad'}"></span>API key ${keyOk ? 'set' : 'missing'}` +
          ` &nbsp;·&nbsp; model ${h.model}` +
          ` &nbsp;·&nbsp; LaTeX ${h.latex_engine ? h.latex_engine : 'not installed'}`;
      } catch (e) {
        $('status').innerHTML = `<span class="dot bad"></span>backend unreachable`;
      }
    }

    function renderChips(el, items, cls) {
      el.innerHTML = '';
      (items || []).forEach((t) => {
        const span = document.createElement('span');
        span.className = 'chip ' + (cls || '');
        span.textContent = t;
        el.appendChild(span);
      });
      if (!items || items.length === 0) {
        el.innerHTML = '<span class="muted" style="font-size:12px;">—</span>';
      }
    }

    function renderResult(p) {
      $('r-title').textContent = p.job_title || '—';
      $('r-company').textContent = p.company || '';
      renderChips($('r-cats'), [p.primary_category + ' (primary)', ...(p.secondary_categories || [])], 'cat');
      $('r-tone').textContent = p.tone_hints || '—';
      renderChips($('r-keywords'), p.keywords_for_highlight, 'kw');
      renderChips($('r-skills'), p.key_skills, '');
      const ul = $('r-resp'); ul.innerHTML = '';
      (p.key_responsibilities || []).forEach((t) => {
        const li = document.createElement('li'); li.textContent = t; ul.appendChild(li);
      });
      $('r-raw').textContent = JSON.stringify(p, null, 2);
      $('result').style.display = 'block';
    }

    async function analyze() {
      const jd = $('jd').value.trim();
      $('error').textContent = '';
      if (!jd) { $('error').textContent = 'Please paste a job description first.'; return; }
      const btn = $('analyzeBtn');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> Analyzing…';
      try {
        const r = await fetch('/jd/analyze', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ jd_text: jd }),
        });
        const data = await r.json();
        if (!r.ok) {
          $('error').textContent = `Error ${r.status}: ${data.detail || JSON.stringify(data)}`;
          $('result').style.display = 'none';
        } else {
          renderResult(data);
        }
      } catch (e) {
        $('error').textContent = 'Request failed: ' + e.message;
      } finally {
        btn.disabled = false;
        btn.textContent = 'Analyze JD';
      }
    }

    $('analyzeBtn').addEventListener('click', analyze);
    $('sampleBtn').addEventListener('click', () => { $('jd').value = SAMPLE_JD; });
    refreshStatus();
  </script>
</body>
</html>
